backend:
  name: github
  repo: botgeer/our-memories
  branch: master
  base_url: https://decapcms-oauth.vercel.app

media_folder: "uploads/photos"
public_folder: "/uploads/photos"

collections:
  - name: "photos"
    label: "📸 照片相册"
    files:
      - label: "照片列表"
        name: "gallery"
        file: "data/gallery.json"
        fields:
          - name: "photos"
            label: "照片"
            widget: "list"
            summary: "{{title}} — {{date}}"
            fields:
              - {label: "标题", name: "title", widget: "string"}
              - {label: "照片", name: "image", widget: "image", required: true}
              - {label: "日期", name: "date", widget: "datetime", format: "YYYY-MM-DD", default: ""}
              - {label: "描述", name: "description", widget: "text", required: false}

  - name: "timeline"
    label: "📖 时光轴"
    files:
      - label: "时光事件列表"
        name: "events"
        file: "data/timeline.json"
        fields:
          - name: "events"
            label: "事件"
            widget: "list"
            summary: "{{date_label}} — {{title}}"
            fields:
              - {label: "日期标签", name: "date_label", widget: "string"}
              - {label: "事件标题", name: "title", widget: "string"}
              - {label: "事件描述", name: "description", widget: "text"}
              - {label: "配图(可选)", name: "image", widget: "image", required: false}

  - name: "settings"
    label: "⚙️ 首页设置"
    files:
      - label: "封面设置"
        name: "hero"
        file: "data/settings.json"
        fields:
          - {label: "首页大标题", name: "hero_title", widget: "string"}
          - {label: "首页副标题", name: "hero_subtitle", widget: "string"}
          - {label: "封面背景图", name: "hero_bg", widget: "image", required: false}